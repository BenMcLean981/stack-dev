name: E2E

on:
  pull_request:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4 # No version needed for pnpm 10+

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Scaffolds a workspace in a temp dir, generates every package type,
      # links, installs, builds, lints, runs the generated apps, and tests.
      - name: Run end-to-end test
        run: ./e2e/run-e2e.sh
